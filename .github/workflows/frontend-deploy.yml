name: Frontend EAS CI/CD

on:
  push:
    branches:
      - staging
      - main
    paths:
      - 'apps/passenger/**'
      - 'apps/driver/**'
      - '@nammabus/shared/**'

jobs:
  build:
    name: Build EAS
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [passenger, driver]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Preview (Staging)
        if: github.ref == 'refs/heads/staging'
        run: cd apps/${{ matrix.app }} && eas build --platform android --profile preview --non-interactive

      - name: Build Production (Main)
        if: github.ref == 'refs/heads/main'
        run: cd apps/${{ matrix.app }} && eas build --platform android --profile production --non-interactive
