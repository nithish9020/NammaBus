# ──────────────────────────────────────────────────────────────
# NammaBus CI/CD Pipeline
# ──────────────────────────────────────────────────────────────
#
# Branches:
#   staging  → Migrate DB + Run tests  (validate before production)
#   main     → Migrate DB only         (Render auto-deploys on push)
#
# Flow:
#   feature branch ──PR──→ staging  (CI: migrate + test)
#   staging        ──PR──→ main     (CI: migrate → Render auto-deploys)
# ──────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main, staging]
    paths:
      - "services/**"

jobs:
  # ── Runs on BOTH staging and main ─────────────────────────
  migrate:
    name: Migrate DB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: services
        run: bun install --frozen-lockfile

      - name: Run DB migrations
        working-directory: services
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: bun run db:migrate

  # ── Runs ONLY on staging ──────────────────────────────────
  test:
    name: Run Tests
    needs: migrate
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: services
        run: bun install --frozen-lockfile

      - name: Start server
        working-directory: services
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: http://localhost:3000
          BASE_URL: http://localhost:3000
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: bun run start &

      - name: Wait for server
        run: sleep 5

      - name: Run API tests
        working-directory: services
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: http://localhost:3000
          BASE_URL: http://localhost:3000
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: bun run test:api
